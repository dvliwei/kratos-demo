syntax = "proto3";

package gameapp.v1;

option go_package = "gameapp/v1;gameappv1";

service GameAppService{
  rpc GetGameApp(GetGameAppRequest) returns (GetGameAppResponse);
  //分页查询游戏APP
  rpc ListGameAppsWithPage(ListGameAppsRequest) returns (ListGameAppsResponse);
  //统计游戏APP数量
  rpc CountGameApps(CountGameAppsRequest) returns (CountGameAppsResponse);
}
message  GameAppsSearch{
  string name = 1;
  //optional 表示字段是可选的，可以不提供
  optional int32 type_os = 2;
}
message ListGameAppsRequest{
  int32 page = 2;
  int32 page_size = 3;
  GameAppsSearch search = 4;
}

message  ListGameAppsResponse{
  // 游戏APP列表
  //repeated 表示一个字段可以有多个值，类似于数组或列表
   repeated GameAppInfo infos = 1;
    uint64 total = 2; // 总记录数
}

message GetGameAppRequest{
  uint64 id = 1;
}
message GameAppInfo{
  uint64 id = 1;
  int64 game_id = 2;
  string app_id = 3;
  string name= 4;
  string app_key = 5;
}
message GetGameAppResponse{
  GameAppInfo info = 1;
}

message CountGameAppsRequest{

}
message CountGameAppsResponse{
  uint64 total = 1; // 总记录数
}
