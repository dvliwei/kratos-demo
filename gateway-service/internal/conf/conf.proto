syntax = "proto3";
package kratos.api;

option go_package = "gateway-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  // 客户端配置
  Clients clients = 3;
}
// 客户端配置
message Clients {
  // 用户服务配置
  User user = 1;
  // 游戏应用服务配置
  GameApp game_app = 2;
}
message User {
  // 用户服务地址
  string  endpoint = 1;
}
message GameApp {
  // 游戏应用服务地址
  string  endpoint = 1;
}
message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}

message Auth {
  message JWT {
    string password = 1;
    int64 expire_seconds = 2;
  }
  JWT jwt = 1;
}
